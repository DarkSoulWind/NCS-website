<!DOCTYPE html>
<html>

<head>
<title>Clue #7</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="import_styles.css">
</head>

<style>
</style>

<body style="font-family:mySecondFont">

<div class="topnav">
	<h1 style="text-align:center;color:#ffffff">Clue #7</h1>
</div>

<h1>How many chambers is the heart made up of?</h1>

<div id="choices" style="display:block">
<form>
	<input type="radio" id="two" name="chambers" value="2">
	<label for="two">2</label><br>
	<input type="radio" id="three" name="chambers" value="3">
	<label for="three">3</label><br>
	<input type="radio" id="four" name="chambers" value="4">
	<label for="four">4</label><br>
	<input type="radio" id="five" name="chambers" value="5">
	<label for="five">5</label>
</form><br>
<button onclick="submit()"><span><h2>Submit</h2></span></button>
</div>

<div id="ifCorrect" style="display:none">
	<h2>Correct!</h2>
	<h3>The heart consists of 4 chambers, the left and right atria and the left and right ventricles.<br></h3>
</div>

<div id="ifWrong" style="display:none">
	<h2>Incorrect!</h2>
	<h3 id="tips"></h3>
</div>

<div class="bottombar">
	<p style="text-align:center;color:#ffffff;font-family:myFirstFont"><a href="index.html" class="BHFlink">Accidents and Emergencies</a> • <a href="https://www.bhf.org.uk" class="BHFlink">The British Heart Foundation</a> • <a href="https://www.justgiving.com/fundraising/bhfscavengerhunt?utm_source=whatsapp&utm_medium=fundraising&utm_content=bhfscavengerhunt&utm_campaign=pfp-whatsapp&utm_term=71e6018a88f6410b99cbe0d9961a63b8" class="BHFlink">Justgiving donation page</a></p>
</div>

</body>

<script>

function submit() {
	if (document.querySelector('input[name="chambers"]:checked').value === "4") {
		document.getElementById("ifCorrect").style = "display:block";
		document.getElementById("ifWrong").style = "display:none";
		document.getElementById("choices").style = "display:none";
	} else {
		document.getElementById("tips").innerHTML = `The heart does not have ${document.querySelector('input[name="chambers"]:checked').value} chambers. <br>Try again.`;
		document.getElementById("ifWrong").style = "display:block";
		document.getElementById("ifCorrect").style = "display:none";
	}
}
</script>

</html>
