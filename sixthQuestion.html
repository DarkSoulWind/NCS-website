<!DOCTYPE html>
<html>

<head>
<title>Clue #6</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="import_styles.css">
</head>

<style>
</style>

<body style="font-family:mySecondFont">

<div class="topnav">
	<h1 style="text-align:center;color:#ffffff">Clue #6</h1>
</div>

<h1>What organ system does the heart belong to?</h1>

<div id="choices" style="display:block">
<form>
	<input type="radio" id="respiratory" name="system" value="respiratory system">
	<label for="respiratory">Respiratory system</label><br>
	<input type="radio" id="endocrine" name="system" value="endocrine system">
	<label for="endocrine">Endocrine system</label><br>
	<input type="radio" id="digestive" name="system" value="digestive system">
	<label for="digestive">Digestive system</label><br>
	<input type="radio" id="circulatory" name="system" value="circulatory system">
	<label for="circulatory">Circulatory system</label>
</form><br>
<button onclick="submit()"><span><h2>Submit</h2></span></button>
</div>

<div id="ifCorrect" style="display:none">
	<h2>Correct!</h2>
	<h3>The heart is a vital organ in the circulatory system, pumping blood so it can be circulated around the body.<br></h3>
</div>

<div id="ifWrong" style="display:none">
	<h2>Nope.</h2>
	<h3 id="tips"></h3>
</div>

<div class="bottombar">
	<p style="text-align:center;color:#ffffff;font-family:myFirstFont"><a href="index.html" class="BHFlink">Accidents and Emergencies</a> • <a href="https://www.bhf.org.uk" class="BHFlink">The British Heart Foundation</a> • <a href="https://www.justgiving.com/fundraising/bhfscavengerhunt?utm_source=whatsapp&utm_medium=fundraising&utm_content=bhfscavengerhunt&utm_campaign=pfp-whatsapp&utm_term=71e6018a88f6410b99cbe0d9961a63b8" class="BHFlink">Justgiving donation page</a></p>
</div>

</body>

<script>

function submit() {
	if (document.querySelector('input[name="system"]:checked').value === "circulatory system") {
		document.getElementById("ifCorrect").style = "display:block";
		document.getElementById("ifWrong").style = "display:none";
		document.getElementById("choices").style = "display:none";
	} else {
		document.getElementById("tips").innerHTML = `The heart is not part of the ${document.querySelector('input[name="system"]:checked').value}.`;
		document.getElementById("ifWrong").style = "display:block";
		document.getElementById("ifCorrect").style = "display:none";
	}
}
</script>

</html>
