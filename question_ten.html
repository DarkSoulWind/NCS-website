<!DOCTYPE html>
<html>

<head>
<title>BHF</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="import_styles.css">
</head>

<style>
@font-face {
	font-family: 'myFirstFont';
	src: url('SF-Pro.ttf') format('truetype');
}

@font-face {
	font-family: 'mySecondFont';
	src: url('Roboto-Thin.ttf') format('truetype');
}
</style>

<body style="font-family:mySecondFont">

<div class="topnav">
	<h1 style="text-align:center;color:#ffffff">Clue #10</h1>
</div>

<h1>How many transplants are carried out every year in the UK?</h1>

<div id="choices" style="display:block">
<form>
	<input type="radio" id="170" name="transplants" value="170">
	<label for="170">170</label><br>
	<input type="radio" id="180" name="transplants" value="180">
	<label for="180">180</label><br>
	<input type="radio" id="190" name="transplants" value="190">
	<label for="190">190</label><br>
	<input type="radio" id="200" name="transplants" value="200">
	<label for="200">200</label>
</form><br>
<button onclick="submit()"><span><h2>Submit</h2></span></button>
</div>

<div id="ifCorrect" style="display:none">
	<h2>Correct!</h2>
	<h3>With help from the British Heart Foundation, a whopping 200 heart transplants are carried out every year!<br></h3>
</div>

<div id="ifWrong" style="display:none">
	<h2>Wrong.</h2>
	<h3 id="tips"></h3>
</div>

<div class="bottombar">
	<p style="text-align:center;color:#ffffff;font-family:myFirstFont">Accidents and Emergencies • The British Heart Foundation</p>
</div>

</body>

<script>
function submit() {
	if (document.querySelector('input[name="transplants"]:checked').value === "200") {
		document.getElementById("ifCorrect").style = "display:block";
		document.getElementById("ifWrong").style = "display:none";
		document.getElementById("choices").style = "display:none";
	} else {
		document.getElementById("tips").innerHTML = `A bit more than ${document.querySelector('input[name="transplants"]:checked').value}!`;
		document.getElementById("ifWrong").style = "display:block";
		document.getElementById("ifCorrect").style = "display:none";
	}
}
</script>

</html>
